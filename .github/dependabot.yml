version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "quarterly"
    open-pull-requests-limit: 1

  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "quarterly"
    open-pull-requests-limit: 0  # Disabled. To enable, change to > 0, recommended value: 10
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/bun"
        
    groups:      
      patch:
        update-types:
          - "patch"
        exclude-patterns:
          - "@cloudflare/*"
          - "wrangler"

      cloudflare:
        patterns:
          - "@cloudflare/*"
          - "wrangler"

      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"

      react-router:
        patterns:
          - "@react-router/*"
          - "react-router"

      storybook:
        patterns:
          - "@storybook/*"
          - "storybook"

      react-email:
        patterns:
          - "@react-email/*"
          - "react-email"
